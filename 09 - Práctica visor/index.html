<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>Visor Nodos</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
    <div class="gallery-container">
        <div class="main-display">
            <img id="featured" src="img/default.gif" alt="Featured Image">
        </div>

        <div class="thumbnail-wrapper">
            <img class="thumbnail active" src="img/default.gif" alt="default">
            <img class="thumbnail" src="img/españa.jpg" alt="españa">
            <img class="thumbnail" src="img/italia.jpg" alt="italia">
            <img class="thumbnail" src="img/portugal.jpg" alt="portugal">
        </div>
    </div>
    <script src="script.js"></script>
</body>

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">

    </head>
    <body>
        
        <h1>🚸 Ficha Alumno 🚸</h1>
        <div id="formulario-escolar" class="formulario-contenedor">
            <form>
                <h3>🎒 Datos del alumno:</h3>
                🔹Nombre: <input id="nombre" type="text"/> <br/>
                🔹Apellido 1: <input id="apellido1" type="text"/> <br/>
                🔹Apellido 2: <input id="apellido2" type="text"/> <br/>
                <h3>Notas:</h3>
                🔢 Nota de asignatura 1: <input id="nota1" type="number"/> <br/>
                🔢 Nota de asignatura 2: <input id="nota2" type="number"/> <br/>
                🔢 Nota de asignatura 3: <input id="nota3" type="number"/> <br/>
            </form>
            <input type="submit" value="✅ Promediar" id="promediar"> <input type="submit" value="🔃 Nuevo" id="reset">
        </div>
        <div>
            <h2 id="promedio-nota"></h2>
            <h2 id="resultado-nota"></h2>
        </div>
        <script src="/script.js"></script>
    </body>
